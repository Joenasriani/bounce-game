<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Old Bounce</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap');

  :root {
    --font-title: 'Fredoka', 'Arial Rounded MT Bold', 'Trebuchet MS', system-ui, sans-serif;
    --font-text: 'Fredoka', 'Arial Rounded MT Bold', 'Trebuchet MS', system-ui, sans-serif;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-right: env(safe-area-inset-right, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left: env(safe-area-inset-left, 0px);
    --ui-pad: clamp(10px, 2.2vmin, 22px);
    --control-size: clamp(56px, 8.5vmin, 76px);
    --control-gap: clamp(10px, 2vmin, 18px);
  }

  * { box-sizing: border-box; }
  body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    min-width: 100%;
    height: 100%;
    min-height: 100%;
    overflow: hidden;
    background: rgb(11, 19, 32);
    touch-action: none;
    font-family: var(--font-text);
    font-weight: 500;
    letter-spacing: clamp(0.25px, 0.08vmin, 0.8px);
    color: rgb(252, 232, 232);
    user-select: none;
    overscroll-behavior: none;
    -webkit-font-smoothing: antialiased;
    text-rendering: geometricPrecision;
  }
  body { min-height: 100dvh; }
  canvas { display: block; width: 100vw; height: 100dvh; }

  .ui {
    position: absolute;
    top: calc(var(--safe-top) + var(--ui-pad));
    left: calc(var(--safe-left) + var(--ui-pad));
    right: calc(var(--safe-right) + var(--ui-pad));
    color: rgb(252, 232, 232);
    font-size: clamp(18px, 3.2vmin, 28px);
    font-weight: 400;
    text-shadow: 0 4px 6px rgba(0,0,0,0.6);
    z-index: 10;
    pointer-events: none;
    display: flex;
    flex-wrap: wrap;
    gap: clamp(8px, 1.8vmin, 18px);
    align-items: flex-start;
    text-transform: uppercase;
    font-family: var(--font-text);
  }
  .ui-badge {
    background: rgba(255,255,255,0.05);
    padding: clamp(3px, 0.8vmin, 5px) clamp(10px, 2vmin, 16px);
    border-radius: clamp(9px, 2vmin, 12px);
    backdrop-filter: blur(4px);
    border: 1px solid rgba(255, 71, 87, 0.2);
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    line-height: 1;
    white-space: nowrap;
  }

  .controls {
    position: absolute;
    bottom: calc(var(--safe-bottom) + clamp(12px, 3.2vmin, 30px));
    left: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding: 0 calc(var(--safe-right) + clamp(14px, 4vmin, 36px)) 0 calc(var(--safe-left) + clamp(14px, 4vmin, 36px));
    pointer-events: none;
    z-index: 10;
  }
  .btn-group { display: flex; gap: var(--control-gap); }
  .btn {
    width: var(--control-size);
    height: var(--control-size);
    min-width: 48px;
    min-height: 48px;
    border-radius: 50%;
    background: rgba(255, 71, 87, 0.1);
    border: 1px solid rgba(255, 71, 87, 0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgb(252, 232, 232);
    font-size: clamp(23px, 4vmin, 34px);
    line-height: 1;
    pointer-events: auto;
    touch-action: none;
    backdrop-filter: blur(5px);
    box-shadow: 0 8px 16px rgba(0,0,0,0.4);
    transition: background 0.1s, transform 0.1s, box-shadow 0.1s;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .btn:active { background: rgba(255, 71, 87, 0.25); transform: translateY(4px); box-shadow: 0 4px 8px rgba(0,0,0,0.4); }

  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 20;
    transition: opacity 0.3s;
    pointer-events: none;
    padding: calc(var(--safe-top) + clamp(10px, 2.5vmin, 24px)) calc(var(--safe-right) + clamp(10px, 3vmin, 28px)) calc(var(--safe-bottom) + clamp(10px, 2.5vmin, 24px)) calc(var(--safe-left) + clamp(10px, 3vmin, 28px));
    overflow: hidden;
  }
  .overlay-bg { background: rgba(0,0,0,0.7); backdrop-filter: blur(6px); position: absolute; inset: 0; pointer-events: auto; }

  .interstitial {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: rgb(252, 232, 232);
    opacity: 0;
    transition: opacity 0.5s ease;
    pointer-events: none;
    padding: calc(var(--safe-top) + 24px) calc(var(--safe-right) + clamp(18px, 5vw, 56px)) calc(var(--safe-bottom) + 24px) calc(var(--safe-left) + clamp(18px, 5vw, 56px));
    z-index: 18;
  }
  .inter-title {
    font-family: var(--font-title);
    font-size: clamp(56px, 14vmin, 142px);
    font-weight: 400;
    letter-spacing: clamp(1px, 0.45vmin, 5px);
    text-shadow: 0 12px 28px rgba(0,0,0,0.86), 0 0 2px rgba(255,255,255,0.28);
    margin: 0;
    color: rgb(255, 71, 87);
    text-transform: uppercase;
    line-height: 0.9;
    max-width: min(94vw, 1100px);
    overflow-wrap: balance;
  }
  .inter-sub {
    font-family: var(--font-title);
    font-size: clamp(24px, 6vmin, 54px);
    color: rgb(255, 207, 82);
    font-weight: 400;
    text-shadow: 0 6px 16px rgba(0,0,0,0.86), 0 0 2px rgba(255,255,255,0.24);
    text-transform: uppercase;
    letter-spacing: clamp(0.8px, 0.28vmin, 3px);
    line-height: 1;
    margin-top: clamp(8px, 1.8vmin, 18px);
    max-width: min(92vw, 900px);
    overflow-wrap: balance;
  }

  .msg-box {
    position: relative;
    background: linear-gradient(145deg, rgb(19, 15, 38), rgb(11, 8, 23));
    padding: clamp(16px, 4vmin, 40px) clamp(18px, 5vmin, 60px);
    border-radius: clamp(18px, 3.5vmin, 24px);
    text-align: center;
    color: rgb(252, 232, 232);
    box-shadow: 0 20px 50px rgba(0,0,0,0.7);
    border: 1px solid rgba(255, 71, 87, 0.2);
    pointer-events: auto;
    width: min(92vw, 500px);
    max-width: min(92vw, 500px);
    max-height: none;
    overflow: visible;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: center;
  }
  .msg-title {
    font-family: var(--font-title);
    font-size: clamp(34px, 7vmin, 56px);
    font-weight: 400;
    margin: 0 0 clamp(6px, 1.4vmin, 10px);
    color: rgb(255, 71, 87);
    text-transform: uppercase;
    letter-spacing: clamp(1.5px, 0.42vmin, 3px);
    line-height: 0.92;
    text-shadow: 0 7px 16px rgba(0,0,0,0.72), 0 0 1px rgba(255,255,255,0.32);
  }
  .msg-sub {
    font-family: var(--font-title);
    font-size: clamp(18px, 3.8vmin, 24px);
    color: rgb(255, 107, 129);
    margin: 0 0 clamp(14px, 3vmin, 25px);
    font-weight: 400;
    line-height: 1.05;
    letter-spacing: clamp(0.8px, 0.25vmin, 1.6px);
    text-shadow: 0 4px 10px rgba(0,0,0,0.72), 0 0 1px rgba(255,255,255,0.22);
  }
  .forge-title {
    font-family: var(--font-title);
    font-size: clamp(30px, 6.5vmin, 48px);
    color: rgb(255, 71, 87);
    line-height: 0.95;
    margin-bottom: clamp(8px, 2vmin, 10px);
    text-shadow: 0 7px 16px rgba(0,0,0,0.72), 0 0 1px rgba(255,255,255,0.32);
  }

  .menu-btn,
  .gen-btn {
    border-radius: clamp(10px, 2vmin, 12px);
    font-size: clamp(18px, 3.6vmin, 25px);
    font-family: var(--font-text);
    letter-spacing: clamp(0.25px, 0.12vmin, 0.8px);
    text-transform: uppercase;
    text-shadow: 0 2px 5px rgba(0,0,0,0.55);
    width: 100%;
    min-height: clamp(42px, 7vmin, 54px);
    line-height: 1;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .menu-btn {
    background: rgba(255, 71, 87, 0.05);
    border: 1px solid rgba(255, 71, 87, 0.3);
    color: rgb(252, 232, 232);
    padding: clamp(8px, 1.8vmin, 12px) clamp(14px, 3vmin, 30px);
    font-weight: 300;
    margin-bottom: clamp(10px, 2.2vmin, 15px);
  }
  .menu-btn:hover { background: rgba(255, 71, 87, 0.15); border-color: rgba(255, 71, 87, 0.6); transform: translateY(-2px); }
  .menu-btn:active { transform: translateY(2px); }

  .gen-btn {
    background: linear-gradient(145deg, rgb(255, 71, 87), rgb(192, 57, 43));
    color: white;
    border: none;
    padding: clamp(8px, 1.8vmin, 12px) clamp(14px, 3vmin, 30px);
    font-weight: 400;
    box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
  }
  .gen-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 71, 87, 0.6); }
  .gen-btn:active { transform: translateY(2px); box-shadow: 0 2px 8px rgba(255, 71, 87, 0.4); }
  .gen-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .back-btn { margin-top: clamp(10px, 2vmin, 15px); margin-bottom: 0; }
  .ai-input {
    width: 100%;
    padding: clamp(8px, 1.8vmin, 10px) 14px;
    min-height: clamp(42px, 7vmin, 52px);
    border-radius: 8px;
    border: 1px solid rgba(255, 71, 87, 0.5);
    background: rgba(0,0,0,0.5);
    color: rgb(252, 232, 232);
    font-size: clamp(18px, 3.6vmin, 24px);
    margin-bottom: clamp(12px, 2.5vmin, 20px);
    outline: none;
    transition: border-color 0.2s;
    text-align: center;
    font-family: var(--font-text);
    font-weight: 300;
    letter-spacing: 1px;
    text-shadow: 0 2px 5px rgba(0,0,0,0.5);
  }
  .ai-input:focus { border-color: rgb(255, 71, 87); box-shadow: 0 0 10px rgba(255, 71, 87, 0.3); }

  .loading-container { display: none; flex-direction: column; align-items: center; margin-top: clamp(10px, 2.2vmin, 20px); }
  .spinner { width: clamp(32px, 6vmin, 45px); height: clamp(32px, 6vmin, 45px); border: 4px solid rgba(255, 71, 87, 0.2); border-top: 4px solid rgb(255, 71, 87); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: clamp(6px, 1.5vmin, 10px); }
  .loading-text {
    font-family: var(--font-text);
    color: rgb(255, 107, 129);
    font-weight: 400;
    font-size: clamp(18px, 3.6vmin, 26px);
    letter-spacing: clamp(0.7px, 0.2vmin, 1.8px);
    line-height: 1;
    text-shadow: 0 3px 8px rgba(0,0,0,0.7);
  }
  .error-text {
    display: none;
    font-family: var(--font-text);
    color: rgb(255, 71, 87);
    margin-top: clamp(8px, 1.8vmin, 15px);
    font-weight: 400;
    font-size: clamp(18px, 3.6vmin, 26px);
    line-height: 1.05;
    text-shadow: 0 3px 8px rgba(0,0,0,0.7);
  }

  @media (max-width: 520px) {
    :root { --control-size: clamp(54px, 16vw, 66px); --control-gap: clamp(8px, 3vw, 14px); }
    .controls { padding-left: calc(var(--safe-left) + 14px); padding-right: calc(var(--safe-right) + 14px); }
    .ui { font-size: clamp(17px, 5vw, 22px); gap: 8px; }
    .msg-box { width: min(92vw, 430px); padding-left: clamp(16px, 5vw, 24px); padding-right: clamp(16px, 5vw, 24px); }
  }

  @media (max-height: 560px) {
    :root { --control-size: clamp(50px, 12vh, 62px); --control-gap: clamp(8px, 2.6vh, 14px); --ui-pad: 8px; }
    .overlay { align-items: center; padding-top: calc(var(--safe-top) + 8px); padding-bottom: calc(var(--safe-bottom) + 8px); }
    .msg-box { width: min(86vw, 480px); padding: clamp(10px, 3vh, 16px) clamp(16px, 5vw, 28px); border-radius: 18px; }
    .msg-title { font-size: clamp(28px, 9vh, 42px); margin-bottom: 4px; line-height: 0.9; }
    .forge-title { font-size: clamp(28px, 9vh, 40px); margin-bottom: 6px; }
    .msg-sub { font-size: clamp(16px, 5.5vh, 21px); margin-bottom: 8px; }
    .menu-btn, .gen-btn { min-height: clamp(34px, 10vh, 42px); font-size: clamp(17px, 5.8vh, 22px); padding-top: 5px; padding-bottom: 5px; }
    .menu-btn { margin-bottom: 8px; }
    .back-btn { margin-top: 8px; }
    .ai-input { min-height: clamp(34px, 10vh, 42px); font-size: clamp(16px, 5.5vh, 21px); padding-top: 5px; padding-bottom: 5px; margin-bottom: 8px; }
    .loading-container { margin-top: 8px; }
    .spinner { width: 30px; height: 30px; margin-bottom: 5px; }
    .loading-text, .error-text { font-size: clamp(16px, 5.5vh, 21px); }
    .inter-title { font-size: clamp(46px, 15vh, 86px); }
    .inter-sub { font-size: clamp(22px, 7vh, 34px); }
  }

  @media (min-width: 900px) and (min-height: 700px) {
    :root { --control-size: 72px; }
    .controls { padding-left: calc(var(--safe-left) + 34px); padding-right: calc(var(--safe-right) + 34px); }
  }

  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="ui">
  <div class="ui-badge">Level <span id="levelCounter">1</span></div>
  <div class="ui-badge" id="ringBadge">Rings: <span id="rings">0/0</span></div>
  <div class="ui-badge" id="lifeBadge">Lives: <span id="lives">3</span></div>
</div>

<div class="overlay" id="startOverlay">
  <div class="overlay-bg"></div>
  <div class="msg-box">
    <div class="msg-title" id="msgTitle">OLD BOUNCE</div>
    <div class="msg-sub" id="msgSub">Select a Game Mode</div>
    <button class="menu-btn" onclick="startGame(event)">Play Original Adventure</button>
    <button class="gen-btn" onclick="openPrompt(event)">AI Level Generator</button>
  </div>
</div>

<div class="overlay" id="promptOverlay" style="display:none; opacity:0;">
  <div class="overlay-bg" onclick="closePrompt(event)"></div>
  <div class="msg-box" style="cursor: default;">
     <div class="msg-title forge-title">FORGE A LEVEL</div>
     <input type="text" id="aiPrompt" class="ai-input" placeholder="e.g., A long cave with lava, rings, conveyors, and timed traps" />
     <br/>
     <button onclick="submitAiLevel(event)" class="gen-btn" id="btnSubmitAi">Generate Play</button>
     <button class="menu-btn back-btn" onclick="closePrompt(event)">Back to Menu</button>
     
     <div id="aiLoadingContainer" class="loading-container">
       <div class="spinner"></div>
       <div class="loading-text">Forging: <span id="etaTimer">15s</span></div>
     </div>
     <div id="aiError" class="error-text">Generation failed. Try again.</div>
  </div>
</div>

<div class="interstitial" id="interstitialUI">
  <div class="inter-title" id="interLevel">Level 2</div>
  <div class="inter-sub" id="interMood">Let's Go!</div>
</div>

<canvas id="gameCanvas"></canvas>

<div class="controls">
  <div class="btn-group">
    <div class="btn" id="btnLeft">L</div>
    <div class="btn" id="btnRight">R</div>
  </div>
  <div class="btn" id="btnJump">U</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const levelEl = document.getElementById('levelCounter');
const ringsEl = document.getElementById('rings');
const ringBadge = document.getElementById('ringBadge');
const livesEl = document.getElementById('lives');
const startOverlay = document.getElementById('startOverlay');
const promptOverlay = document.getElementById('promptOverlay');
const aiPrompt = document.getElementById('aiPrompt');
const btnSubmitAi = document.getElementById('btnSubmitAi');
const aiLoadingContainer = document.getElementById('aiLoadingContainer');
const etaTimer = document.getElementById('etaTimer');
const aiError = document.getElementById('aiError');
const interUI = document.getElementById('interstitialUI');
const interLevel = document.getElementById('interLevel');
const interMood = document.getElementById('interMood');

const mult = (a, b) => a * b;

let width, height;
function resize() {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const AudioContext = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function playSound(type) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  const now = audioCtx.currentTime;
  
  if (type === 'jump') {
    osc.type = 'sine'; osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(600, now + 0.15);
    gain.gain.setValueAtTime(0.4, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
    osc.start(now); osc.stop(now + 0.15);
  } else if (type === 'bounce') {
    osc.type = 'triangle'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(80, now + 0.1);
    gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
    osc.start(now); osc.stop(now + 0.1);
  } else if (type === 'ring') {
    // Required hoop: short, bright high chime.
    osc.type = 'square'; osc.frequency.setValueAtTime(880, now); osc.frequency.setValueAtTime(1320, now + 0.05);
    gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.1);
    osc.start(now); osc.stop(now + 0.1);
  } else if (type === 'crystal') {
    // Checkpoint crystal: lower, warmer chime.
    osc.type = 'triangle'; osc.frequency.setValueAtTime(520, now); osc.frequency.linearRampToValueAtTime(680, now + 0.18);
    gain.gain.setValueAtTime(0.13, now); gain.gain.linearRampToValueAtTime(0, now + 0.22);
    osc.start(now); osc.stop(now + 0.22);
  } else if (type === 'life') {
    // Extra life: compact 1-up style arpeggio.
    osc.type = 'sine'; osc.frequency.setValueAtTime(660, now); osc.frequency.setValueAtTime(880, now + 0.07); osc.frequency.setValueAtTime(1320, now + 0.14);
    gain.gain.setValueAtTime(0.14, now); gain.gain.linearRampToValueAtTime(0, now + 0.25);
    osc.start(now); osc.stop(now + 0.25);
  } else if (type === 'door') {
    osc.type = 'square'; osc.frequency.setValueAtTime(200, now); osc.frequency.linearRampToValueAtTime(400, now + 0.4);
    gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now + 0.4);
    osc.start(now); osc.stop(now + 0.4);
  } else if (type === 'explosion') {
    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, now); osc.frequency.exponentialRampToValueAtTime(10, now + 0.4);
    gain.gain.setValueAtTime(0.6, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
    osc.start(now); osc.stop(now + 0.4);
  } else if (type === 'cheer') {
    osc.type = 'sine'; osc.frequency.setValueAtTime(400, now); osc.frequency.linearRampToValueAtTime(600, now + 0.2); osc.frequency.linearRampToValueAtTime(800, now + 0.4);
    gain.gain.setValueAtTime(0.3, now); gain.gain.linearRampToValueAtTime(0, now + 0.5);
    osc.start(now); osc.stop(now + 0.5);
  }
}

function roundedRectPath(ctx, x, y, w, h, r) {
  const radius = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.lineTo(x + w - radius, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
  ctx.lineTo(x + w, y + h - radius);
  ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
  ctx.lineTo(x + radius, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
  ctx.lineTo(x, y + radius);
  ctx.quadraticCurveTo(x, y, x + radius, y);
  ctx.closePath();
}

const TILE_SIZE = 45;
const GRAVITY = 0.35;
const FRICTION_GROUND = 0.80;
const FRICTION_AIR = 0.92;
const JUMP_FORCE = -8.5;
const MOVE_ACCEL = 1.2;
const MAX_SPEED = 6.5;
const FRAME_DT = 0.016;
const MAX_SPIN_RATE = (Math.PI * 2) / 0.5; // 360 degrees per 0.5 seconds at max speed.
const GROUND_SPIN_PER_SPEED = MAX_SPIN_RATE / MAX_SPEED;
const AIR_SPIN_PER_SPEED = GROUND_SPIN_PER_SPEED * 0.7;
const SPIN_STOP_THRESHOLD = 0.08;
const BOUNCE_FACTOR = -0.35;

let gameState = 'start'; 
let gameMode = 'campaign'; 
let currentLevel = 0;
let map = [];
let aiMapCache = [];
let ringsTotal = 0;
let ringsCollected = 0;
let time = 0;
let interstitialTimer = 0;
let onConveyor = 0;
let proximityCharge = {};
let fallingPlatforms = {};
let checkpoint = null;
let lives = 3;
let speedBoostTimer = 0;
let antiGravityTimer = 0;
let activeWater = false;

const levels = [
  [
    "1111111111111111111111111",
    "10000000000000000000000E1",
    "1000000000000000000011111",
    "1000000000000000111100001",
    "1000000000001111000000001",
    "1000000011110000000000001",
    "1S00111100000000000000001",
    "1111111111111111111111111"
  ],
  [
    "1111111111111111111111111111111111111111111111",
    "1000000000000000000000000000000000000000000001",
    "1000000000000000000000000000000000000000000001",
    "1000000000000000000000000000000000000000000001",
    "1000000000000000000000000000000000000000000001",
    "1000000000000000000000000000000000000000000001",
    "1000000000000000000000000000000000000000000001",
    "1000000000000000000000000000000000000000000001",

function isHandledKey(e) {
  return e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'ArrowUp' || e.key === ' ';
}

window.addEventListener('keydown', e => {
  if (!isHandledKey(e)) return;
  e.preventDefault();
  if (e.key === 'ArrowLeft') keys.left = true;
  if (e.key === 'ArrowRight') keys.right = true;
  if (e.key === 'ArrowUp' || e.key === ' ') keys.up = true;
});
window.addEventListener('keyup', e => {
  if (!isHandledKey(e)) return;
  e.preventDefault();
  if (e.key === 'ArrowLeft') keys.left = false;
  if (e.key === 'ArrowRight') keys.right = false;
  if (e.key === 'ArrowUp' || e.key === ' ') {

    keys.jumpPressed = false;
  }
});

function loadLevelData(layoutMap, isAI) {
  map = []; ringsTotal = 0; ringsCollected = 0;
  for (let y = 0; y < layoutMap.length; y++) {
    let row = [];
    for (let x = 0; x < layoutMap[y].length; x++) {
      const char = layoutMap[y][x];
      if (char === '1') row.push(1);
      else if (char === 'X') row.push(2);
      else if (char === 'R') { row.push(3); ringsTotal++; }
      else if (char === 'E') row.push(4);
      else if (char === 'B') row.push(5);
      else if (char === '<') row.push(6);
      else if (char === '>') row.push(7);
      else if (char === 'T') row.push(8);
      else if (char === 'Z') row.push(9);
      else if (char === 'M') row.push(10);
      else if (char === 'L') row.push(11);
      else if (char === 'P') row.push(12);
      else if (char === 'V') row.push(13);
      else if (char === 'F') row.push(14);
      else if (char === 'W') row.push(15);
      else if (char === 'H') row.push(16);
      else if (char === 'G') row.push(17);
      else if (char === 'J') row.push(18);
      else if (char === '~') row.push(19);
      else if (char === 'U') row.push(20);
      else if (char === 'N') row.push(21);
      else if (char === 'Q') row.push(22);
      else if (char === 'Y') row.push(23);
      else if (char === 'A') row.push(24);
      else if (char === 'K') row.push(25);
      else if (char === 'O') row.push(26);
      else if (char === 'D') row.push(27);
      else if (char === 'S') { 
        row.push(0); 
        ball.x = mult(x, TILE_SIZE) + TILE_SIZE / 2; 
        ball.y = mult(y, TILE_SIZE) + TILE_SIZE / 2; 
      }
      else row.push(0);
    }
    map.push(row);
  }
  resetDynamicLevelState();
  resetBallState();
  
  if(isAI) {
      levelEl.innerText = 'AI';
  } else {
      levelEl.innerText = currentLevel + 1;
  }
  
  if (ringsTotal === 0) {
    ringBadge.style.display = 'none';
  } else {
    ringBadge.style.display = 'block';
    ringsEl.innerText = ringsCollected + '/' + ringsTotal;
  }
  
  updateLifeHud();
  gameState = 'play';
  startOverlay.style.opacity = '0';
  promptOverlay.style.opacity = '0';
  interUI.style.opacity = '0';
  setTimeout(() => {
    startOverlay.style.display = 'none';
    promptOverlay.style.display = 'none';
  }, 300);
}

function normalizeAiMapData(mapData) {
  if (!Array.isArray(mapData) || mapData.length !== AI_MAP_ROWS) return null;

  let starts = 0;
  let exits = 0;
  const normalized = [];

  for (let r = 0; r < mapData.length; r++) {
    if (typeof mapData[r] !== 'string' || mapData[r].length !== AI_MAP_COLS) return null;

    let row = '';
    for (let c = 0; c < mapData[r].length; c++) {
      const tile = mapData[r][c];
      if (!AI_ALLOWED_TILES.has(tile)) return null;
      if (tile === 'S') starts++;
      if (tile === 'E') exits++;
      row += tile;
    }
    normalized.push(row);
  }

  if (starts !== 1 || exits < 1) return null;
  return normalized;
}

function isAiClearTile(tile) {
  return tile === '0' || tile === 'S' || tile === 'E' || tile === 'R' || tile === 'Z' || tile === 'M' || tile === 'L' || tile === 'P' || tile === 'V' || tile === 'F' || tile === 'W' || tile === '~' || tile === 'U' || tile === 'N' || tile === 'Y' || tile === 'A' || tile === 'K' || tile === 'O' || tile === 'D';
}

function isAiSolidTile(tile) {
  return tile === '1' || tile === '<' || tile === '>' || tile === 'T' || tile === 'H' || tile === 'G' || tile === 'J' || tile === 'Q';
}

function isAiDangerTile(tile) {
  return tile === 'X' || tile === 'B';
}


function isAiDynamicHazardTile(tile) {
  return tile === 'Z' || tile === 'M' || tile === 'L' || tile === 'P' || tile === 'V' || tile === 'F' || tile === 'W' || tile === 'H' || tile === 'G' || tile === 'J' || tile === 'D';
}

function findAiTile(mapData, target) {
  for (let r = 0; r < mapData.length; r++) {
    for (let c = 0; c < mapData[r].length; c++) {
      if (mapData[r][c] === target) return { r, c };
    }
  }
  return null;
}

function hasClosedAiBorders(mapData) {
  for (let c = 0; c < AI_MAP_COLS; c++) {
    if (mapData[0][c] !== '1' || mapData[AI_MAP_ROWS - 1][c] !== '1') return false;
  }
  for (let r = 0; r < AI_MAP_ROWS; r++) {
    if (mapData[r][0] !== '1' || mapData[r][AI_MAP_COLS - 1] !== '1') return false;
  }
  return true;
}

function hasSafeAiStart(mapData) {
  const start = findAiTile(mapData, 'S');
  if (!start || start.r < 2) return false;

  for (let dr = -1; dr <= 1; dr++) {
    for (let dc = -1; dc <= 1; dc++) {
      const r = start.r + dr;
      const c = start.c + dc;
      if (r < 0 || r >= AI_MAP_ROWS || c < 0 || c >= AI_MAP_COLS) return false;
      if (dr === 0 && dc === 0) continue;
      if (isAiDangerTile(mapData[r][c]) || isAiDynamicHazardTile(mapData[r][c])) return false;
    }
  }

  return isAiClearTile(mapData[start.r - 1][start.c]) && isAiClearTile(mapData[start.r - 2][start.c]);
}

function hasFunctionalAiTunnels(mapData) {
  for (let r = 1; r < AI_MAP_ROWS - 1; r++) {
    for (let c = 1; c < AI_MAP_COLS - 1; c++) {
      if (!isAiClearTile(mapData[r][c])) continue;
      if (isAiSolidTile(mapData[r - 1][c]) && isAiSolidTile(mapData[r + 1][c])) return false;
    }
  }
  return true;
}

function hasAiInteractiveGameplay(mapData) {
  let count = 0;
  for (let r = 0; r < mapData.length; r++) {
    for (let c = 0; c < mapData[r].length; c++) {
      const tile = mapData[r][c];
      if (tile === 'R' || tile === '<' || tile === '>' || tile === 'T' || tile === 'Z' || tile === 'M' || tile === 'L' || tile === 'P' || tile === 'V' || tile === 'F' || tile === 'W' || tile === 'H' || tile === 'G' || tile === 'J' || tile === '~' || tile === 'U' || tile === 'N' || tile === 'Q' || tile === 'Y' || tile === 'A' || tile === 'K' || tile === 'O' || tile === 'D' || tile === 'B' || tile === 'X') count++;
    }
  }
  return count >= 3;
}

function hasClearAiTravelLine(mapData, fromR, fromC, toR, toC) {
  const steps = Math.max(Math.abs(toR - fromR), Math.abs(toC - fromC));
  if (steps <= 1) return true;

  for (let i = 1; i < steps; i++) {
    const r = Math.round(fromR + ((toR - fromR) * i) / steps);
    const c = Math.round(fromC + ((toC - fromC) * i) / steps);
    if (r <= 0 || r >= AI_MAP_ROWS - 1 || c <= 0 || c >= AI_MAP_COLS - 1) return false;
    if (!isAiClearTile(mapData[r][c])) return false;
  }
  return true;
}

function isMapValid(mapData) {
  const normalized = normalizeAiMapData(mapData);
  if (!normalized) return false;
  if (!hasClosedAiBorders(normalized)) return false;
  if (!hasSafeAiStart(normalized)) return false;
  if (!hasFunctionalAiTunnels(normalized)) return false;
  if (!hasAiInteractiveGameplay(normalized)) return false;

  let start = null;
  const rings = new Set();

  for (let r = 0; r < normalized.length; r++) {
    for (let c = 0; c < normalized[r].length; c++) {
      const tile = normalized[r][c];
      if (tile === 'S') start = {r,c};
      if (tile === 'R') rings.add(r + ',' + c);
    }
  }

  if (!start) return false;

  const width = normalized[0].length;
  const visited = Array(normalized.length).fill(0).map(() => Array(width).fill(false));
  const queue = [start];
  visited[start.r][start.c] = true;

  let reachedExit = false;
  const reachedRings = new Set();

  while(queue.length > 0) {
      const node = queue.shift();
      const r = node.r;
      const c = node.c;
      const currentTile = normalized[r][c];

      if (currentTile === 'E') reachedExit = true;
      if (currentTile === 'R') reachedRings.add(r + ',' + c);

      const dirs = [[0, -1], [0, 1]];
      for(let dr=-4; dr<=8; dr++) {
          for(let dc=-5; dc<=5; dc++) {
              if (dr !== 0 || dc !== 0) dirs.push([dr, dc]);
          }
      }

      for(let i=0; i<dirs.length; i++) {
          const dr = dirs[i][0];
          const dc = dirs[i][1];
          const nr = r + dr, nc = c + dc;
          if(nr <= 0 || nr >= normalized.length - 1 || nc <= 0 || nc >= width - 1 || visited[nr][nc]) continue;
          const tile = normalized[nr][nc];
          if(!isAiClearTile(tile) || isAiDangerTile(tile)) continue;

          if (!hasClearAiTravelLine(normalized, r, c, nr, nc)) continue;

          visited[nr][nc] = true;
          queue.push({r: nr, c: nc});
      }
  }
  return reachedExit && (reachedRings.size === rings.size);
}

function parseAiLevelResponse(data) {
  if (!data || !Array.isArray(data.map)) return null;
  const normalized = normalizeAiMapData(data.map);
  if (!normalized || !isMapValid(normalized)) return null;
  return {
    levelName: typeof data.levelName === 'string' ? data.levelName.trim().slice(0, 40) : 'AI Level',
    map: normalized
  };
}

async function generateCustomLevelAPI(userPrompt, retryCount = 0) {
  const endpoint = getAiEndpoint();
  if (!endpoint) {
    throw new Error('AI endpoint not configured. Add a serverless proxy endpoint before enabling AI generation.');
  }

  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 15000);

  try {
    const response = await fetch(endpoint, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
          game: "old-bounce",
          prompt: userPrompt,
          width: AI_MAP_COLS,
          height: AI_MAP_ROWS,
          allowedTiles: Array.from(AI_ALLOWED_TILES)
        }),
        signal: controller.signal
    });

    if (!response.ok) throw new Error("AI proxy request failed");

    const data = await response.json();
    const parsed = parseAiLevelResponse(data);
    if (!parsed) throw new Error("AI proxy returned an invalid or unsafe level");

    return parsed;
  } catch (err) {
    if (err && err.name === 'AbortError') {
      throw new Error('AI request timed out');
    }
    if (retryCount < 2) {
      await new Promise(r => setTimeout(r, mult(Math.pow(2, retryCount), 1000)));
      return generateCustomLevelAPI(userPrompt, retryCount + 1);
    }
    throw err;
  } finally {
    clearTimeout(timeoutId);
  }
}

let aiTimerInterval;

window.submitAiLevel = async function(e) {
  if(e) e.stopPropagation();
  const promptText = aiPrompt.value.trim();
  if(!promptText) return;

  if (!audioCtx) audioCtx = new AudioContext();

  btnSubmitAi.disabled = true;
  aiLoadingContainer.style.display = 'flex';
  aiError.style.display = 'none';

  let secondsLeft = 15;
  etaTimer.innerText = secondsLeft + 's';
  aiTimerInterval = setInterval(() => {
    if (secondsLeft > 1) {
      secondsLeft--;
      etaTimer.innerText = secondsLeft + 's';
    } else {
      etaTimer.innerText = "almost done...";
    }
  }, 1000);

  try {
    let validMap = null;
    let attempts = 0;
    
    while(!validMap && attempts < 3) {
        attempts++;
        const generated = await generateCustomLevelAPI(promptText);
        const parsed = parseAiLevelResponse(generated);
        if(parsed) validMap = parsed.map;
    }
    
    if(!validMap) throw new Error("Blocked Level. Generating failed to find clear path.");

    aiMapCache = validMap;
    gameMode = 'ai';
    
    hidePromptOnly();
    setTimeout(() => {
       loadLevelData(aiMapCache, true);
    }, 400);

  } catch(err) {
    console.error(err);
    setAiError(err && err.message ? err.message : 'Generation failed. Try again.');
  } finally {
    clearInterval(aiTimerInterval);
    btnSubmitAi.disabled = false;
    aiLoadingContainer.style.display = 'none';
  }
}

window.startGame = function(e) {
  if(e) e.stopPropagation();
  if (!audioCtx) audioCtx = new AudioContext();
  
  if (gameState === 'start' || gameState === 'win') {
    gameMode = 'campaign';
    currentLevel = 0;
    lives = 3;
    updateLifeHud(); 
    loadLevel(currentLevel);
  }
}

function die() {
  resetInputState();
  playSound('explosion');

  if (checkpoint && checkpoint.gameMode === gameMode && (gameMode === 'ai' || checkpoint.level === currentLevel) && lives > 1) {
    lives--;
    updateLifeHud();
    ball.x = checkpoint.x;
    ball.y = checkpoint.y;
    ball.vx = 0;
    ball.vy = 0;
    ball.squash = 1;
    ball.stretch = 1;
    ball.isGrounded = false;
    ball.jumps = 0;
    setBallMode(checkpoint.mode || 'normal');
    speedBoostTimer = 0;
    antiGravityTimer = 0;
    return;
  }

  lives = 3;
  updateLifeHud();
  if(gameMode === 'ai') {
      loadLevelData(aiMapCache, true);
  } else {
      loadLevel(currentLevel);
  }
}

function triggerInterstitial() {
  gameState = 'interstitial';
  interstitialTimer = 0;
  playSound('cheer');
  
  if(gameMode === 'ai') {
      interLevel.innerText = "AI Level Cleared!";
      interMood.innerText = "Great Job!";
      interUI.style.opacity = '1';
      return;
  }
  
  let nextLvl = currentLevel + 2;
  let mood = "Let's Go!";
  if (nextLvl > 10) { interLevel.innerText = "Game Complete!"; mood = "Old Bounce Master!"; }
  else {
    interLevel.innerText = "Level " + nextLvl;
    const moods = ["Awesome!", "Bouncy!", "Keep Going!", "Watch Out!", "Perfect!"];
    mood = moods[currentLevel % moods.length];
  }
  interMood.innerText = mood;
  interUI.style.opacity = '1';
}

function isTrapActive() {
  let speed = (gameMode === 'campaign' && currentLevel === 5) ? 0.6 : 1.5;
  return Math.floor(mult(time, speed)) % 2 === 0;
}


function getPulsePhase(r, c) {
  return (time * 1.15 + ((r + c) % 4) * 0.25) % 1;
}

function isPulseHazardActive(r, c) {
  return getPulsePhase(r, c) < 0.52;
}

function isPulseHazardWarning(r, c) {
  const phase = getPulsePhase(r, c);
  return phase >= 0.52 && phase < 0.72;
}

function getMovingHazardRect(r, c) {
  const tx = mult(c, TILE_SIZE);
  const ty = mult(r, TILE_SIZE);
  const phase = time * 2.2 + ((r * 3 + c) % 7) * 0.55;
  const centerX = tx + TILE_SIZE / 2 + Math.sin(phase) * TILE_SIZE * 0.28;
  return { x: centerX - 6, y: ty + 6, w: 12, h: TILE_SIZE - 12 };
}

function getLaserSegment(r, c) {
  const tx = mult(c, TILE_SIZE);
  const ty = mult(r, TILE_SIZE);
  const cx = tx + TILE_SIZE / 2;
  const cy = ty + TILE_SIZE / 2;
  const angle = time * 2.4 + ((r + c) % 6) * 0.5;
  const len = TILE_SIZE * 0.38;
  return {
    x1: cx - Math.cos(angle) * len,
    y1: cy - Math.sin(angle) * len,
    x2: cx + Math.cos(angle) * len,
    y2: cy + Math.sin(angle) * len
  };
}

function pointToSegmentDistance(px, py, x1, y1, x2, y2) {
  const dx = x2 - x1;
  const dy = y2 - y1;
  const lengthSq = dx * dx + dy * dy;
  if (lengthSq === 0) return Math.hypot(px - x1, py - y1);
  let t = ((px - x1) * dx + (py - y1) * dy) / lengthSq;
  t = Math.max(0, Math.min(1, t));
  const projX = x1 + t * dx;
  const projY = y1 + t * dy;
  return Math.hypot(px - projX, py - projY);
}

function movingHazardHits(r, c, br) {
  const rect = getMovingHazardRect(r, c);
  return aabb(ball.x, ball.y, br, rect.x, rect.y, rect.w, rect.h);
}

function rotatingLaserHits(r, c) {
  const seg = getLaserSegment(r, c);
  return pointToSegmentDistance(ball.x, ball.y, seg.x1, seg.y1, seg.x2, seg.y2) < 9;
}


function getProximityBombCharge(r, c) {
  return proximityCharge[r + ',' + c] || 0;
}

function getVerticalCrusherRect(r, c) {
  const tx = mult(c, TILE_SIZE);
  const ty = mult(r, TILE_SIZE);
  const phase = time * 2.05 + ((r + c) % 5) * 0.65;
  const y = ty + 6 + ((Math.sin(phase) + 1) / 2) * (TILE_SIZE - 22);
  return { x: tx + 8, y, w: TILE_SIZE - 16, h: 14 };
}

function verticalCrusherHits(r, c, br) {
  const rect = getVerticalCrusherRect(r, c);
  return aabb(ball.x, ball.y, br, rect.x, rect.y, rect.w, rect.h);
}

function getFallingCrusherRect(r, c) {
  const tx = mult(c, TILE_SIZE);
  const ty = mult(r, TILE_SIZE);
  const phase = (time * 1.35 + ((r * 2 + c) % 6) * 0.17) % 1;
  let y = ty + 2;
  let h = 10;
  if (phase > 0.32 && phase < 0.68) {
    const drop = Math.sin(((phase - 0.32) / 0.36) * Math.PI);
    y = ty + 2 + drop * (TILE_SIZE - 18);
    h = 16;
  }
  return { x: tx + TILE_SIZE / 2 - 7, y, w: 14, h };
}

function fallingCrusherHits(r, c, br) {
  const rect = getFallingCrusherRect(r, c);
  return aabb(ball.x, ball.y, br - 4, rect.x, rect.y, rect.w, rect.h);
}

function getSweepingLaserSegment(r, c) {
  const tx = mult(c, TILE_SIZE);
  const ty = mult(r, TILE_SIZE);
  const sweep = (Math.sin(time * 2.0 + ((r + c) % 5) * 0.6) + 1) / 2;
  const x = tx + 8 + sweep * (TILE_SIZE - 16);
  return { x1: x, y1: ty + 6, x2: x, y2: ty + TILE_SIZE - 6 };
}

function sweepingLaserHits(r, c) {
  const seg = getSweepingLaserSegment(r, c);
  return pointToSegmentDistance(ball.x, ball.y, seg.x1, seg.y1, seg.x2, seg.y2) < 8;
}

function getMovingPlatformRect(r, c) {
  const tx = mult(c, TILE_SIZE);
  const ty = mult(r, TILE_SIZE);
  const phase = time * 1.65 + ((r + c) % 4) * 0.7;
  const offset = Math.sin(phase) * TILE_SIZE * 0.18;
  return { x: tx + 4 + offset, y: ty + 7, w: TILE_SIZE - 8, h: TILE_SIZE - 10 };
}

function isFallingPlatformActive(r, c) {
  const triggerTime = fallingPlatforms[r + ',' + c];
  if (triggerTime === undefined) return true;
  const elapsed = time - triggerTime;
  if (elapsed > 2.2) {
    delete fallingPlatforms[r + ',' + c];
    return true;
  }
  return elapsed < 0.35 || elapsed > 1.25;
}

function getFallingPlatformAlpha(r, c) {
  const triggerTime = fallingPlatforms[r + ',' + c];
  if (triggerTime === undefined) return 1;
  const elapsed = time - triggerTime;
  if (elapsed < 0.35) return 1 - elapsed * 1.2;
  if (elapsed < 1.25) return 0.18;
  return Math.min(1, (elapsed - 1.25) / 0.6);
}

function triggerFallingPlatform(r, c) {
  const key = r + ',' + c;
  if (fallingPlatforms[key] === undefined) fallingPlatforms[key] = time;
}

function updateProximityBombs() {
  for (let r = 0; r < map.length; r++) {
    for (let c = 0; c < map[r].length; c++) {
      if (map[r][c] !== 12) continue;
      const key = r + ',' + c;
      const cx = mult(c, TILE_SIZE) + TILE_SIZE / 2;
      const cy = mult(r, TILE_SIZE) + TILE_SIZE / 2;
      const dist = Math.hypot(ball.x - cx, ball.y - cy);
      const current = proximityCharge[key] || 0;
      if (dist < TILE_SIZE * 1.18) {
        proximityCharge[key] = Math.min(1, current + 0.035);
        if (proximityCharge[key] >= 1) {
          die();
          return;
        }
      } else if (current > 0) {
        proximityCharge[key] = Math.max(0, current - 0.025);
      }
    }
  }
}


function getSpiderRect(r, c) {
  const tx = mult(c, TILE_SIZE);
  const ty = mult(r, TILE_SIZE);
  const phase = time * 1.8 + ((r + c) % 6) * 0.6;
  const horizontal = (r + c) % 2 === 0;
  const ox = horizontal ? Math.sin(phase) * TILE_SIZE * 0.26 : 0;
  const oy = horizontal ? 0 : Math.sin(phase) * TILE_SIZE * 0.26;
  return { x: tx + 10 + ox, y: ty + 10 + oy, w: TILE_SIZE - 20, h: TILE_SIZE - 20 };
}

function spiderHits(r, c, br) {
  const rect = getSpiderRect(r, c);
  return aabb(ball.x, ball.y, br - 4, rect.x, rect.y, rect.w, rect.h);
}

function handleWater(r, c, br, tx, ty) {
  if (!aabb(ball.x, ball.y, br, tx + 2, ty + 2, TILE_SIZE - 4, TILE_SIZE - 4)) return false;
  activeWater = true;
  if (ball.mode === 'large') {
    ball.y = Math.min(ball.y, ty - br + 6);
    ball.vy = Math.min(ball.vy, 0.25);
    ball.isGrounded = true;
    ball.rubberBoost = 0;
  } else {
    ball.vy += 0.55;
    ball.vx *= 0.92;
    if (ball.y > ty + TILE_SIZE * 0.72) die();
  }
  return true;
}

function applyPickupTile(r, c, t, tx, ty, br) {
  if (!aabb(ball.x, ball.y, br, tx + 5, ty + 5, TILE_SIZE - 10, TILE_SIZE - 10)) return false;
  if (t === 20) { setBallMode('large'); playSound('door'); return true; }
  if (t === 21) { setBallMode('normal'); playSound('door'); return true; }
  if (t === 23) { speedBoostTimer = 2.4; map[r][c] = 0; playSound('ring'); return true; }
  if (t === 24) { antiGravityTimer = 3.0; map[r][c] = 0; playSound('jump'); return true; }
  if (t === 25) { setCheckpoint(); map[r][c] = 0; playSound('crystal'); return true; }
  if (t === 26) { lives = Math.min(5, lives + 1); updateLifeHud(); map[r][c] = 0; playSound('life'); return true; }
  return false;
}

function aabb(bx, by, br, tx, ty, tw, th) {
  const cx = Math.max(tx, Math.min(bx, tx + tw));
  const cy = Math.max(ty, Math.min(by, ty + th));
  const dx = bx - cx; 
  const dy = by - cy;
  return (dx * dx + dy * dy) < (br * br);
}

function updateBallRolling() {
  const speed = ball.vx;
  const absSpeed = Math.abs(speed);
  const currentDirection = ball.spinRate > 0.2 ? 1 : (ball.spinRate < -0.2 ? -1 : 0);
  const targetDirection = speed > SPIN_STOP_THRESHOLD ? 1 : (speed < -SPIN_STOP_THRESHOLD ? -1 : 0);

  if (targetDirection !== 0 && currentDirection !== 0 && targetDirection !== currentDirection && ball.spinReverseCooldown <= 0) {
    ball.spinReverseCooldown = 0.1;
    ball.spinRate = 0;
  }

  if (ball.spinReverseCooldown > 0) {
    ball.spinReverseCooldown = Math.max(0, ball.spinReverseCooldown - FRAME_DT);
    ball.spinRate *= 0.45;
  } else {
    const spinScale = ball.isGrounded ? GROUND_SPIN_PER_SPEED : AIR_SPIN_PER_SPEED;
    const targetSpinRate = targetDirection === 0 ? 0 : Math.max(-MAX_SPIN_RATE, Math.min(MAX_SPIN_RATE, speed * spinScale));
    const ease = targetDirection === 0 ? 0.08 : (ball.isGrounded ? 0.18 : 0.12);
    ball.spinRate += (targetSpinRate - ball.spinRate) * ease;
  }

  if (absSpeed < SPIN_STOP_THRESHOLD && Math.abs(ball.spinRate) < 0.03) ball.spinRate = 0;
  ball.spinRate = Math.max(-MAX_SPIN_RATE, Math.min(MAX_SPIN_RATE, ball.spinRate));
  ball.angle += ball.spinRate * FRAME_DT;
}

function checkCollisions() {
  ball.isGrounded = false;
  onConveyor = 0;
  const br = ball.radius;
  
  ball.x += ball.vx;
  let startC = Math.floor((ball.x - br) / TILE_SIZE);
  let endC = Math.floor((ball.x + br) / TILE_SIZE);
  let startR = Math.floor((ball.y - br) / TILE_SIZE);
  let endR = Math.floor((ball.y + br) / TILE_SIZE);

  for (let r = startR; r <= endR; r++) {
    for (let c = startC; c <= endC; c++) {
      if (r < 0 || r >= map.length || c < 0 || c >= map[0].length) continue;
      const t = map[r][c];
      const tx = mult(c, TILE_SIZE), ty = mult(r, TILE_SIZE);
      if (t === 19 && handleWater(r, c, br, tx, ty)) continue;
      if ((t === 20 || t === 21 || t === 23 || t === 24 || t === 25 || t === 26) && applyPickupTile(r, c, t, tx, ty, br)) continue;
      if (t === 27 && spiderHits(r, c, br)) { die(); return; }
      
      const dynamicPlatformRect = t === 16 ? getMovingPlatformRect(r, c) : null;
      const isSolid = t === 1 || t === 6 || t === 7 || (t === 8 && isTrapActive()) || (t === 17 && isFallingPlatformActive(r, c)) || t === 18 || t === 22;
      
      if (dynamicPlatformRect && aabb(ball.x, ball.y, br, dynamicPlatformRect.x, dynamicPlatformRect.y, dynamicPlatformRect.w, dynamicPlatformRect.h)) {
        if (ball.vx > 0) { ball.x = dynamicPlatformRect.x - br; ball.vx = mult(ball.vx, BOUNCE_FACTOR); }
        else if (ball.vx < 0) { ball.x = dynamicPlatformRect.x + dynamicPlatformRect.w + br; ball.vx = mult(ball.vx, BOUNCE_FACTOR); }
      } else if (isSolid && aabb(ball.x, ball.y, br, tx, ty, TILE_SIZE, TILE_SIZE)) {
        if (ball.vx > 0) { ball.x = tx - br; ball.vx = mult(ball.vx, BOUNCE_FACTOR); }
        else if (ball.vx < 0) { ball.x = tx + TILE_SIZE + br; ball.vx = mult(ball.vx, BOUNCE_FACTOR); }
      } else if (t === 2 && aabb(ball.x, ball.y, br - 6, tx + 8, ty + 16, TILE_SIZE - 16, TILE_SIZE - 16)) {
        die(); return;
      } else if (t === 5 && aabb(ball.x, ball.y, br, tx + 5, ty + 5, TILE_SIZE - 10, TILE_SIZE - 10)) {
        die(); return;
      } else if (t === 9 && isPulseHazardActive(r, c) && aabb(ball.x, ball.y, br - 4, tx + 6, ty + 6, TILE_SIZE - 12, TILE_SIZE - 12)) {
        die(); return;
      } else if (t === 10 && movingHazardHits(r, c, br - 5)) {
        die(); return;
      } else if (t === 11 && rotatingLaserHits(r, c)) {
        die(); return;
      } else if (t === 13 && verticalCrusherHits(r, c, br - 4)) {
        die(); return;
      } else if (t === 14 && fallingCrusherHits(r, c, br - 4)) {
        die(); return;
      } else if (t === 15 && sweepingLaserHits(r, c)) {
        die(); return;
      } else if (t === 3 && aabb(ball.x, ball.y, br, tx, ty, TILE_SIZE, TILE_SIZE)) {
        map[r][c] = 0; ringsCollected++; playSound('ring'); ringsEl.innerText = ringsCollected + '/' + ringsTotal;
        if (ringsCollected === ringsTotal) playSound('door');
      } else if (t === 4 && ringsCollected >= ringsTotal && aabb(ball.x, ball.y, br, tx, ty, TILE_SIZE, TILE_SIZE)) {
        triggerInterstitial(); return;
      }
    }
  }

  const effectiveGravity = antiGravityTimer > 0 ? -0.22 : GRAVITY;
  ball.vy += effectiveGravity;
  ball.y += ball.vy;
  startC = Math.floor((ball.x - br) / TILE_SIZE);
  endC = Math.floor((ball.x + br) / TILE_SIZE);
  startR = Math.floor((ball.y - br) / TILE_SIZE);
  endR = Math.floor((ball.y + br) / TILE_SIZE);

  for (let r = startR; r <= endR; r++) {
    for (let c = startC; c <= endC; c++) {
      if (r < 0 || r >= map.length || c < 0 || c >= map[0].length) continue;
      const t = map[r][c];
      const tx = mult(c, TILE_SIZE), ty = mult(r, TILE_SIZE);
      if (t === 19 && handleWater(r, c, br, tx, ty)) continue;
      if ((t === 20 || t === 21 || t === 23 || t === 24 || t === 25 || t === 26) && applyPickupTile(r, c, t, tx, ty, br)) continue;
      if (t === 27 && spiderHits(r, c, br)) { die(); return; }
      
      const dynamicPlatformRect = t === 16 ? getMovingPlatformRect(r, c) : null;
      const isSolid = t === 1 || t === 6 || t === 7 || (t === 8 && isTrapActive()) || (t === 17 && isFallingPlatformActive(r, c)) || t === 18 || t === 22;
      
      if (dynamicPlatformRect && aabb(ball.x, ball.y, br, dynamicPlatformRect.x, dynamicPlatformRect.y, dynamicPlatformRect.w, dynamicPlatformRect.h)) {
        if (ball.vy > 0) {
          ball.y = dynamicPlatformRect.y - br;
          if (ball.vy > 3) { playSound('bounce'); ball.squash = 1.15; ball.stretch = 0.85; }
          ball.vy = mult(ball.vy, BOUNCE_FACTOR);
          if (Math.abs(ball.vy) < 1.5) { ball.vy = 0; ball.isGrounded = true; }
        } else if (ball.vy < 0) {
          ball.y = dynamicPlatformRect.y + dynamicPlatformRect.h + br; ball.vy = mult(ball.vy, BOUNCE_FACTOR);
        }
      } else if (isSolid && aabb(ball.x, ball.y, br, tx, ty, TILE_SIZE, TILE_SIZE)) {
        if (ball.vy > 0) {
          ball.y = ty - br; 
          if (t === 18) {
            playSound('jump');
            ball.vy = ball.mode === 'large' ? -13.4 : -12.2;
            ball.squash = 1.18;
            ball.stretch = 0.82;
            ball.isGrounded = false;
            ball.jumps = 1;
          } else if (t === 22) {
            playSound('bounce');
            ball.rubberBoost = Math.min(4, ball.rubberBoost + 1);
            ball.vy = -(8.8 + ball.rubberBoost * 1.15 + (ball.mode === 'large' ? 1.1 : 0));
            ball.squash = 1.15;
            ball.stretch = 0.85;
            ball.isGrounded = false;
          } else {
            ball.rubberBoost = 0;
            if (t === 17) triggerFallingPlatform(r, c);
            if (ball.vy > 3) { playSound('bounce'); ball.squash = 1.15; ball.stretch = 0.85; }
            ball.vy = mult(ball.vy, BOUNCE_FACTOR);
            if (Math.abs(ball.vy) < 1.5) { ball.vy = 0; ball.isGrounded = true; }
            if (t === 6) onConveyor = -1;
            if (t === 7) onConveyor = 1;
          }
        } else if (ball.vy < 0) { 
          ball.y = ty + TILE_SIZE + br; ball.vy = mult(ball.vy, BOUNCE_FACTOR); 
        }
      } else if (t === 2 && aabb(ball.x, ball.y, br - 6, tx + 8, ty + 16, TILE_SIZE - 16, TILE_SIZE - 16)) {
        die(); return;
      } else if (t === 5 && aabb(ball.x, ball.y, br, tx + 5, ty + 5, TILE_SIZE - 10, TILE_SIZE - 10)) {
        die(); return;
      } else if (t === 9 && isPulseHazardActive(r, c) && aabb(ball.x, ball.y, br - 4, tx + 6, ty + 6, TILE_SIZE - 12, TILE_SIZE - 12)) {
        die(); return;
      } else if (t === 10 && movingHazardHits(r, c, br - 5)) {
        die(); return;
      } else if (t === 11 && rotatingLaserHits(r, c)) {
        die(); return;
      } else if (t === 13 && verticalCrusherHits(r, c, br - 4)) {
        die(); return;
      } else if (t === 14 && fallingCrusherHits(r, c, br - 4)) {
        die(); return;
      } else if (t === 15 && sweepingLaserHits(r, c)) {
        die(); return;
      } else if (t === 3 && aabb(ball.x, ball.y, br, tx, ty, TILE_SIZE, TILE_SIZE)) {
        map[r][c] = 0; ringsCollected++; playSound('ring'); ringsEl.innerText = ringsCollected + '/' + ringsTotal;
        if (ringsCollected === ringsTotal) playSound('door');
      } else if (t === 4 && ringsCollected >= ringsTotal && aabb(ball.x, ball.y, br, tx, ty, TILE_SIZE, TILE_SIZE)) {
        triggerInterstitial(); return;
      }
    }
  }
}

function update() {
  if (gameState === 'interstitial') {
    interstitialTimer += 0.016;
    
    ball.vx = mult(ball.vx, 0.85);
    ball.vy = mult(ball.vy, 0.85);
    ball.x += ball.vx;
    ball.y += ball.vy;
    
    ball.stretch = Math.max(0, ball.stretch - 0.025);
    ball.squash = Math.max(0, ball.squash - 0.025);
    updateBallRolling();

    if (interstitialTimer >= 1.8) { 
      if(gameMode === 'ai') {
          gameState = 'start';
          interUI.style.opacity = '0';
          document.getElementById('msgTitle').innerText = 'AI LEVEL BEATEN';
          document.getElementById('msgSub').innerText = 'Select a Game Mode';
          openPrompt();
      } else {
          currentLevel++;
          loadLevel(currentLevel);
      }
    }
    return;
  }
  
  if (gameState !== 'play') return;
  
  updateProximityBombs();
  if (gameState !== 'play') return;
  
  if (speedBoostTimer > 0) speedBoostTimer = Math.max(0, speedBoostTimer - FRAME_DT);
  if (antiGravityTimer > 0) antiGravityTimer = Math.max(0, antiGravityTimer - FRAME_DT);
  const moveBoost = speedBoostTimer > 0 ? 1.25 : 1;
  if (keys.left) ball.vx -= MOVE_ACCEL * moveBoost;
  if (keys.right) ball.vx += MOVE_ACCEL * moveBoost;
  
  ball.vx = mult(ball.vx, ball.isGrounded ? FRICTION_GROUND : FRICTION_AIR);
  
  if (onConveyor !== 0) {
    ball.vx += mult(onConveyor, 1.5);
  }
  
  const currentMaxSpeed = speedBoostTimer > 0 ? MAX_SPEED * 1.38 : MAX_SPEED;
  if (ball.vx > currentMaxSpeed) ball.vx = currentMaxSpeed;
  if (ball.vx < -currentMaxSpeed) ball.vx = -currentMaxSpeed;
  
  if (ball.isGrounded) ball.jumps = 0;

  if (keys.up && !keys.jumpPressed && ball.jumps < 2) {
    ball.vy = ball.mode === 'large' ? JUMP_FORCE * 1.16 : JUMP_FORCE;
    ball.squash = 1.10; ball.stretch = 0.90;
    playSound('jump'); 
    ball.isGrounded = false;
    ball.jumps++;
    keys.jumpPressed = true;
  }
  if (!keys.up) keys.jumpPressed = false;
  
  checkCollisions();
  if (gameState !== 'play') return;
  if (ball.y > map.length * TILE_SIZE + 200) { die(); return; }
  
  const easeBack = ball.isGrounded ? 0.18 : 0.14;
  ball.stretch += mult((1 - ball.stretch), easeBack);
  ball.squash += mult((1 - ball.squash), easeBack);
  updateBallRolling();
}

let camX = 0, camY = 0;

function draw() {
  ctx.clearRect(0, 0, width, height);
  time += 0.016;
  
  const bgGrad = ctx.createLinearGradient(0, 0, 0, height);
  bgGrad.addColorStop(0, 'rgb(11, 19, 32)');
  bgGrad.addColorStop(1, 'rgb(30, 41, 59)');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, width, height);
  
  if (gameState === 'start' || gameState === 'win') return;
  
  ctx.save();
  let targetCamX = width / 2 - ball.x;
  let targetCamY = height / 2 - ball.y;
  camX += mult((targetCamX - camX), 0.1);
  camY += mult((targetCamY - camY), 0.1);
  ctx.translate(camX, camY);
  
  const trapActive = isTrapActive();

  let startCol = Math.floor(-camX / TILE_SIZE) - 2;
  let endCol = startCol + Math.ceil(width / TILE_SIZE) + 4;
  let startRow = Math.floor(-camY / TILE_SIZE) - 2;
  let endRow = startRow + Math.ceil(height / TILE_SIZE) + 4;

  startCol = Math.max(0, startCol);
  endCol = Math.min(map[0].length, endCol);
  startRow = Math.max(0, startRow);
  endRow = Math.min(map.length, endRow);

  for (let r = startRow; r < endRow; r++) {
    for (let c = startCol; c < endCol; c++) {
      const t = map[r][c];
      if (t === 0) continue;
      const tx = mult(c, TILE_SIZE), ty = mult(r, TILE_SIZE);
      
      if (t === 1 || t === 6 || t === 7 || t === 8) {
        if (t === 8 && !trapActive) {
          ctx.fillStyle = 'rgba(30, 41, 59, 0.2)';
          ctx.fillRect(tx, ty, TILE_SIZE, TILE_SIZE);
          continue;
        }

        ctx.fillStyle = 'rgb(15, 23, 42)';
        ctx.beginPath();
        ctx.moveTo(tx, ty + TILE_SIZE); ctx.lineTo(tx + TILE_SIZE, ty + TILE_SIZE);
        ctx.lineTo(tx + TILE_SIZE, ty + TILE_SIZE + 10); ctx.lineTo(tx, ty + TILE_SIZE + 10);
        ctx.fill();
        
        ctx.fillStyle = t === 8 ? 'rgb(71, 85, 105)' : 'rgb(30, 41, 59)';
        ctx.fillRect(tx, ty, TILE_SIZE, TILE_SIZE);
        
        if (t === 6 || t === 7) {
          ctx.fillStyle = 'rgba(255,255,255,0.2)';
          let offset = Math.floor(mult(time, 30)) % TILE_SIZE;
          if (t === 6) offset = TILE_SIZE - offset;
          ctx.fillRect(tx + offset, ty + 10, 5, TILE_SIZE - 20);
        }

        ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.fillRect(tx, ty, TILE_SIZE, 3);
        ctx.fillStyle = 'rgba(255,255,255,0.05)'; ctx.fillRect(tx, ty, 3, TILE_SIZE);
      } else if (t === 2) {
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.beginPath();
        ctx.moveTo(tx + TILE_SIZE/2, ty + 8); ctx.lineTo(tx + TILE_SIZE - 4, ty + TILE_SIZE + 5); ctx.lineTo(tx + 4, ty + TILE_SIZE + 5);
        ctx.fill();
        const sGrad = ctx.createLinearGradient(tx, ty, tx, ty + TILE_SIZE);
        sGrad.addColorStop(0, 'rgb(255, 71, 87)'); sGrad.addColorStop(1, 'rgb(192, 57, 43)');
        ctx.fillStyle = sGrad;
        ctx.beginPath();
        ctx.moveTo(tx + TILE_SIZE/2, ty + 4); ctx.lineTo(tx + TILE_SIZE - 4, ty + TILE_SIZE); ctx.lineTo(tx + 4, ty + TILE_SIZE);
        ctx.fill();
      } else if (t === 5) {
        const pulse = mult(Math.sin(mult(time, 5)), 2);
        ctx.fillStyle = 'rgb(17, 17, 17)';
        ctx.beginPath(); ctx.arc(tx + TILE_SIZE/2, ty + TILE_SIZE/2, TILE_SIZE/2.5, 0, mult(Math.PI, 2)); ctx.fill();
        ctx.fillStyle = 'rgb(255, 71, 87)';
        ctx.beginPath(); ctx.arc(tx + TILE_SIZE/2, ty + TILE_SIZE/2, TILE_SIZE/6 + pulse, 0, mult(Math.PI, 2)); ctx.fill();
        ctx.strokeStyle = 'rgb(255, 255, 255)'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(tx + TILE_SIZE/2, ty + 10); ctx.lineTo(tx + TILE_SIZE/2 + 10, ty + 2); ctx.stroke();
      } else if (t === 9) {
        const active = isPulseHazardActive(r, c);
        const warning = isPulseHazardWarning(r, c);
        const pulse = active ? Math.sin(mult(time, 10)) * 3 : 0;
        ctx.fillStyle = active ? 'rgba(255, 71, 87, 0.18)' : (warning ? 'rgba(254, 202, 87, 0.14)' : 'rgba(46, 213, 115, 0.10)');
        ctx.fillRect(tx + 4, ty + 4, TILE_SIZE - 8, TILE_SIZE - 8);
        ctx.strokeStyle = active ? 'rgb(255, 71, 87)' : (warning ? 'rgb(254, 202, 87)' : 'rgba(46, 213, 115, 0.55)');
        ctx.lineWidth = active ? 3 : 2;
        ctx.beginPath();
        ctx.arc(tx + TILE_SIZE / 2, ty + TILE_SIZE / 2, TILE_SIZE / 3 + pulse, 0, mult(Math.PI, 2));
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(tx + 10, ty + TILE_SIZE / 2);
        ctx.lineTo(tx + TILE_SIZE - 10, ty + TILE_SIZE / 2);
        ctx.moveTo(tx + TILE_SIZE / 2, ty + 10);
        ctx.lineTo(tx + TILE_SIZE / 2, ty + TILE_SIZE - 10);
        ctx.stroke();
        if (active) {
          ctx.strokeStyle = 'rgba(255,255,255,0.75)';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(tx + 12, ty + 14);
          ctx.lineTo(tx + 21, ty + 25);
          ctx.lineTo(tx + 16, ty + 25);
          ctx.lineTo(tx + 28, ty + 36);
          ctx.stroke();
        }
      } else if (t === 10) {
        const rect = getMovingHazardRect(r, c);
        ctx.strokeStyle = 'rgba(255,255,255,0.14)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(tx + 8, ty + TILE_SIZE / 2);
        ctx.lineTo(tx + TILE_SIZE - 8, ty + TILE_SIZE / 2);
        ctx.stroke();
        ctx.fillStyle = 'rgba(255, 71, 87, 0.18)';
        ctx.fillRect(tx + 5, ty + 5, TILE_SIZE - 10, TILE_SIZE - 10);
        const mGrad = ctx.createLinearGradient(rect.x, rect.y, rect.x + rect.w, rect.y + rect.h);
        mGrad.addColorStop(0, 'rgb(255, 71, 87)');
        mGrad.addColorStop(1, 'rgb(254, 202, 87)');

        ctx.fillRect(rect.x, rect.y, rect.w, rect.h);
        ctx.strokeStyle = 'rgba(255,255,255,0.7)';
        ctx.lineWidth = 1;
        ctx.strokeRect(rect.x - 2, rect.y, rect.w + 4, rect.h);
      } else if (t === 11) {
        const seg = getLaserSegment(r, c);
        ctx.fillStyle = 'rgba(255, 71, 87, 0.13)';
        ctx.beginPath();
        ctx.arc(tx + TILE_SIZE / 2, ty + TILE_SIZE / 2, TILE_SIZE / 2.8, 0, mult(Math.PI, 2));
        ctx.fill();
        ctx.strokeStyle = 'rgba(255, 107, 129, 0.92)';
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(seg.x1, seg.y1);
        ctx.lineTo(seg.x2, seg.y2);
        ctx.stroke();
        ctx.strokeStyle = 'rgba(255,255,255,0.65)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(seg.x1, seg.y1);
        ctx.lineTo(seg.x2, seg.y2);
        ctx.stroke();
        ctx.fillStyle = 'rgb(15, 23, 42)';
        ctx.beginPath();
        ctx.arc(tx + TILE_SIZE / 2, ty + TILE_SIZE / 2, 6, 0, mult(Math.PI, 2));
        ctx.fill();
      } else if (t === 12) {
        const charge = getProximityBombCharge(r, c);

        const cy = ty + TILE_SIZE / 2;
        ctx.strokeStyle = charge > 0.7 ? 'rgba(255, 71, 87, 0.9)' : 'rgba(254, 202, 87, 0.55)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(cx, cy, TILE_SIZE * 0.58, 0, mult(Math.PI, 2));

        ctx.fillStyle = 'rgb(17, 24, 39)';
        ctx.beginPath();
        ctx.arc(cx, cy, TILE_SIZE * 0.24, 0, mult(Math.PI, 2));
        ctx.fill();
        ctx.fillStyle = charge > 0.7 ? 'rgb(255, 71, 87)' : 'rgb(254, 202, 87)';
        ctx.beginPath();
        ctx.arc(cx, cy, TILE_SIZE * (0.08 + charge * 0.12), 0, mult(Math.PI, 2));

        ctx.strokeStyle = 'rgba(255,255,255,0.72)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();

      } else if (t === 13) {

        ctx.fillRect(tx + 6, ty + 5, TILE_SIZE - 12, TILE_SIZE - 10);
        ctx.fillStyle = 'rgb(255, 71, 87)';
        ctx.fillRect(rect.x, rect.y, rect.w, rect.h);

      } else if (t === 14) {

        ctx.fillRect(tx + TILE_SIZE / 2 - 8, ty + 4, 16, TILE_SIZE - 8);
        ctx.fillStyle = 'rgb(255, 107, 129)';
        ctx.beginPath();
        ctx.moveTo(rect.x, rect.y);

        ctx.strokeStyle = 'rgba(255,255,255,0.7)';
        ctx.lineWidth = 1;
        ctx.stroke();
      } else if (t === 15) {
        const seg = getSweepingLaserSegment(r, c);
        ctx.fillStyle = 'rgba(255, 71, 87, 0.10)';
        ctx.fillRect(tx + 5, ty + 5, TILE_SIZE - 10, TILE_SIZE - 10);
        ctx.strokeStyle = 'rgba(255, 107, 129, 0.95)';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(seg.x1, seg.y1);
        ctx.lineTo(seg.x2, seg.y2);
        ctx.stroke();
        ctx.strokeStyle = 'rgba(255,255,255,0.65)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(tx + 8, ty + 8);
        ctx.lineTo(tx + TILE_SIZE - 8, ty + 8);
        ctx.moveTo(tx + 8, ty + TILE_SIZE - 8);
        ctx.lineTo(tx + TILE_SIZE - 8, ty + TILE_SIZE - 8);
        ctx.stroke();
      } else if (t === 16) {
        const rect = getMovingPlatformRect(r, c);
        ctx.strokeStyle = 'rgba(255,255,255,0.18)';

        ctx.strokeStyle = 'rgba(255,255,255,0.65)';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(rect.x, rect.y, rect.w, rect.h);

        ctx.fillStyle = 'rgba(254, 202, 87, 0.25)';

        ctx.fillStyle = 'rgb(254, 202, 87)';

        ctx.strokeStyle = 'rgba(255,255,255,0.7)';

        ctx.strokeRect(tx + 4, ty + 8 + (1 - alpha) * 8, TILE_SIZE - 8, TILE_SIZE - 14);

      } else if (t === 18) {

          ctx.lineTo(ax, ty + 17 - pulse * 3);

      } else if (t === 19) {

      } else if (t === 20) {

        const spikeGrad = ctx.createLinearGradient(tx, ty + 8, tx, ty + TILE_SIZE - 6);

        spikeGrad.addColorStop(1, 'rgb(37, 99, 235)');
        ctx.fillStyle = spikeGrad;
        ctx.beginPath();
        ctx.moveTo(tx + TILE_SIZE / 2, ty + 9);
        ctx.lineTo(tx + TILE_SIZE - 10, ty + TILE_SIZE - 8);

        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = 'rgb(254, 202, 87)';
        ctx.beginPath(); ctx.arc(tx + TILE_SIZE / 2, ty + 17, 8, Math.PI, 0); ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.75)'; ctx.lineWidth = 1.5; ctx.stroke();
      } else if (t === 21) {
        ctx.fillStyle = 'rgba(255, 71, 87, 0.18)';
        ctx.fillRect(tx + 7, ty + 12, TILE_SIZE - 14, TILE_SIZE - 14);
        ctx.fillStyle = 'rgb(255, 71, 87)';
        ctx.beginPath(); ctx.moveTo(tx + TILE_SIZE/2, ty + 12); ctx.lineTo(tx + TILE_SIZE - 10, ty + TILE_SIZE - 10); ctx.lineTo(tx + 10, ty + TILE_SIZE - 10); ctx.closePath(); ctx.fill();
      } else if (t === 22) {
        const rubberGrad = ctx.createLinearGradient(tx, ty + 8, tx, ty + TILE_SIZE);
        rubberGrad.addColorStop(0, 'rgb(96, 165, 250)');
        rubberGrad.addColorStop(1, 'rgb(30, 64, 175)');
        ctx.fillStyle = rubberGrad;
        roundedRectPath(ctx, tx + 2, ty + 8, TILE_SIZE - 4, TILE_SIZE - 10, 9);
        ctx.fill();
        ctx.strokeStyle = 'rgba(191, 219, 254, 0.95)';
        ctx.lineWidth = 3;
        for (let i = 0; i < 3; i++) {
          ctx.beginPath();
          ctx.moveTo(tx + 8, ty + 16 + i * 8);
          ctx.quadraticCurveTo(tx + TILE_SIZE / 2, ty + 8 + i * 8, tx + TILE_SIZE - 8, ty + 16 + i * 8);
          ctx.stroke();
        }
      } else if (t === 23) {
        ctx.fillStyle = 'rgba(254, 202, 87, 0.20)';
        roundedRectPath(ctx, tx + 6, ty + 6, TILE_SIZE - 12, TILE_SIZE - 12, 7);
        ctx.fill();
        ctx.fillStyle = 'rgb(254, 202, 87)';
        roundedRectPath(ctx, tx + 10, ty + 12, TILE_SIZE - 20, TILE_SIZE - 16, 5);
        ctx.fill();
        ctx.fillStyle = 'rgb(15, 23, 42)';
        ctx.font = '700 20px Fredoka, Arial Rounded MT Bold, sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('+', tx + TILE_SIZE/2, ty + TILE_SIZE/2 + 1);
      } else if (t === 24) {
        const pulse = (Math.sin(time * 5) + 1) / 2;
        ctx.fillStyle = 'rgba(148, 163, 184, 0.18)';
        ctx.fillRect(tx + 6, ty + 6, TILE_SIZE - 12, TILE_SIZE - 12);
        const antiGrad = ctx.createLinearGradient(tx, ty + 6, tx, ty + TILE_SIZE - 8);
        antiGrad.addColorStop(0, 'rgb(148, 163, 184)');
        antiGrad.addColorStop(1, 'rgb(37, 99, 235)');
        ctx.fillStyle = antiGrad;
        ctx.beginPath();
        ctx.moveTo(tx + TILE_SIZE / 2, ty + 7 - pulse * 3);
        ctx.lineTo(tx + TILE_SIZE - 12, ty + TILE_SIZE - 9);
        ctx.lineTo(tx + 12, ty + TILE_SIZE - 9);
        ctx.closePath();

        ctx.fillStyle = 'rgb(254, 202, 87)';
        ctx.fillRect(tx + 12, ty + TILE_SIZE - 19, 5, 10);

      } else if (t === 25) {

        ctx.strokeStyle = 'rgba(255,255,255,0.8)'; ctx.lineWidth = 1.5; ctx.stroke();

      } else if (t === 26) {

        ctx.beginPath();

      } else if (t === 4) {
        const isOpen = ringsCollected >= ringsTotal;
        ctx.fillStyle = isOpen ? 'rgb(46, 213, 115)' : 'rgb(255, 71, 87)';
        ctx.fillRect(tx, ty, TILE_SIZE, TILE_SIZE);
        ctx.fillStyle = 'rgb(15, 23, 42)';

          ctx.fillRect(tx + 6, ty + 6, TILE_SIZE - 12, TILE_SIZE - 12);
          ctx.fillStyle = 'rgba(46, 213, 115, 0.2)';

          ctx.beginPath();
          ctx.arc(tx + TILE_SIZE / 2, ty + 18, 8, Math.PI, 0);
          ctx.stroke();
          ctx.fillStyle = 'rgb(254, 202, 87)';
          ctx.fillRect(tx + TILE_SIZE / 2 - 8, ty + 17, 16, 15);
          ctx.fillStyle = 'rgb(15, 23, 42)';

          ctx.arc(tx + TILE_SIZE / 2, ty + 24, 2.5, 0, mult(Math.PI, 2));
          ctx.fill();
        }
      }
    }
  }
  
  if (checkpoint && checkpoint.gameMode === gameMode && (gameMode === 'ai' || checkpoint.level === currentLevel)) {
    const flagX = checkpoint.x;
    const flagY = checkpoint.y - TILE_SIZE * 0.8;
    ctx.save();
    ctx.globalAlpha = 0.9;
    ctx.strokeStyle = 'rgba(254, 202, 87, 0.9)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(flagX, flagY - 4);
    ctx.lineTo(flagX, flagY + 24);
    ctx.stroke();
    ctx.fillStyle = 'rgba(254, 202, 87, 0.9)';
    ctx.beginPath();
    ctx.moveTo(flagX + 1, flagY - 4);
    ctx.lineTo(flagX + 18, flagY + 2);
    ctx.lineTo(flagX + 1, flagY + 9);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  ctx.save();
  ctx.translate(ball.x, ball.y);
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath(); ctx.arc(0, ball.radius + 4, mult(ball.radius, 0.8), 0, mult(Math.PI, 2)); ctx.fill();
  ctx.rotate(ball.angle);
  ctx.scale(ball.squash, ball.stretch);
  const bGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, ball.radius);
  if (ball.mode === 'large') {
    bGrad.addColorStop(0, 'rgb(147, 197, 253)'); bGrad.addColorStop(0.7, 'rgb(59, 130, 246)'); bGrad.addColorStop(1, 'rgb(30, 64, 175)');
  } else {
    bGrad.addColorStop(0, 'rgb(255, 107, 129)'); bGrad.addColorStop(0.7, 'rgb(255, 71, 87)'); bGrad.addColorStop(1, 'rgb(192, 57, 43)');
  }
  ctx.fillStyle = bGrad;
  ctx.beginPath(); ctx.arc(0, 0, ball.radius, 0, mult(Math.PI, 2)); ctx.fill();
  ctx.save();
  ctx.beginPath(); ctx.arc(0, 0, ball.radius - 0.5, 0, mult(Math.PI, 2)); ctx.clip();
  ctx.strokeStyle = 'rgba(255,255,255,0.24)';
  ctx.lineWidth = 1.25;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-mult(ball.radius, 0.48), -mult(ball.radius, 0.07));
  ctx.quadraticCurveTo(0, -mult(ball.radius, 0.22), mult(ball.radius, 0.48), mult(ball.radius, 0.07));
  ctx.stroke();
  ctx.strokeStyle = 'rgba(114, 17, 32, 0.18)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-mult(ball.radius, 0.42), mult(ball.radius, 0.34));
  ctx.quadraticCurveTo(0, mult(ball.radius, 0.46), mult(ball.radius, 0.42), mult(ball.radius, 0.34));
  ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.22)';
  ctx.beginPath(); ctx.arc(-mult(ball.radius, 0.28), -mult(ball.radius, 0.30), mult(ball.radius, 0.10), 0, mult(Math.PI, 2)); ctx.fill();
  ctx.restore();
  ctx.restore();
  
  ctx.restore();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
